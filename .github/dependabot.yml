version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
