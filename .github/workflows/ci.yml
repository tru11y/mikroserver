# =============================================================================
# CI — Mikroserver
#
# Runs on every PR and push to main.
# Gates: secret-scan → lint/type-check/test (parallel) → docker-build+push
#
# WireGuard safety: CI never touches the VPS, wg0, or any host service.
# All network access is outbound HTTPS only (GHCR push, apt packages).
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# JOB 1 — Secret scan (must pass before anything else)
# Prevents WireGuard keys, RouterOS credentials, JWT secrets from landing in
# git history. Scans the full commit range on PRs, HEAD on pushes.
# ---------------------------------------------------------------------------
jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history required for gitleaks

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="origin/main..HEAD" --redact --exit-code 1

  # ---------------------------------------------------------------------------
  # JOB 2 — Backend: lint, type-check, unit tests
  # Runs AFTER secret-scan to avoid wasting compute on tainted commits.
  # Postgres + Redis service containers mirror production deps.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend — Lint / Type-check / Test
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mikroserver
          POSTGRES_PASSWORD: mikroserver
          POSTGRES_DB: mikroserver_test
        # No `ports:` needed: GitHub Actions service containers share a Docker
        # network with the runner. The job reaches postgres via localhost without
        # host-port mapping. Omitting ports reduces the attack surface.
        options: >-
          --health-cmd "pg_isready -U mikroserver"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: "true"
      NODE_ENV: test
      DATABASE_URL: postgresql://mikroserver:mikroserver@localhost:5432/mikroserver_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      WAVE_API_KEY: "ci-placeholder"
      WAVE_WEBHOOK_SECRET: "ci-placeholder"
      # JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, ENCRYPTION_KEY are intentionally
      # absent here — they are generated at runtime (see step below).
      # Hardcoding placeholder strings in YAML, even fake ones, normalises
      # secret-shaped values for reviewers and trains scanners to ignore them.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Generate ephemeral test secrets
        # Generated per-run via openssl — never stored, never committed, never logged.
        # Values are cryptographically random and scoped to this runner's lifetime only.
        run: |
          printf "JWT_ACCESS_SECRET=%s\n"  "$(openssl rand -hex 32)" >> $GITHUB_ENV
          printf "JWT_REFRESH_SECRET=%s\n" "$(openssl rand -hex 32)" >> $GITHUB_ENV
          printf "ENCRYPTION_KEY=%s\n"     "$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Type-check (strict)
        run: npm run type-check      # tsc --noEmit — catches what build misses

      - name: Apply test migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test -- --runInBand --passWithNoTests

  # ---------------------------------------------------------------------------
  # JOB 3 — Frontend: lint, type-check, build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend — Lint / Type-check / Build
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi

      - name: Lint
        run: npm run lint

      - name: Type-check (strict)
        # Hard failure on any TypeScript error — no stderr suppression, no fallback.
        # The frontend package.json must define a `type-check` script.
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /proxy
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""

  # ---------------------------------------------------------------------------
  # JOB 4 — Docker security scan (Trivy)
  # Builds images in CI runner memory only — never pushed, never reaches VPS.
  # Blocks on HIGH/CRITICAL unfixed CVEs.
  # Scoped GHA cache keys (scope=trivy-backend / trivy-frontend) prevent
  # cache poisoning between builds and allow build-push to reuse these layers.
  # ---------------------------------------------------------------------------
  docker-security:
    name: Docker Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (local only)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          load: true
          push: false
          tags: mikroserver-backend:ci
          cache-from: type=gha,scope=trivy-backend
          cache-to: type=gha,mode=max,scope=trivy-backend

      - name: Scan backend image
        # v0.36.0 (2026-04-22): latest DB and scanner engine — maximises CVE detection
        # coverage. Pin to this tag; bump deliberately after testing.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mikroserver-backend:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Build frontend image (local only)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          build-args: |
            NEXT_PUBLIC_API_URL=/proxy
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=
          load: true
          push: false
          tags: mikroserver-frontend:ci
          cache-from: type=gha,scope=trivy-frontend
          cache-to: type=gha,mode=max,scope=trivy-frontend

      - name: Scan frontend image
        # v0.36.0 (2026-04-22): latest DB and scanner engine — maximises CVE detection
        # coverage. Pin to this tag; bump deliberately after testing.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mikroserver-frontend:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ---------------------------------------------------------------------------
  # JOB 5 — Build + push immutable images to GHCR
  # Only runs on push to main (not PRs) and only if all checks pass.
  # Tags: git SHA (immutable) + "latest" (floating pointer).
  # These images are what CD will deploy — never rebuilt on the VPS.
  # Cache scopes match docker-security: build-push reuses already-warmed layers.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Images to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write    # required to push to ghcr.io

    outputs:
      image-tag: ${{ steps.sha.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.sha.outputs.tag }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha,scope=trivy-backend
          cache-to: type=gha,mode=max,scope=trivy-backend

      - name: Push migrations image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: migrations
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/migrations:${{ steps.sha.outputs.tag }}
            ghcr.io/${{ github.repository }}/migrations:latest
          cache-from: type=gha,scope=trivy-backend
          cache-to: type=gha,mode=max,scope=trivy-backend

      - name: Push dashboard image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          build-args: |
            NEXT_PUBLIC_API_URL=/proxy
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ steps.sha.outputs.tag }}
            ghcr.io/${{ github.repository }}/dashboard:latest
          cache-from: type=gha,scope=trivy-frontend
          cache-to: type=gha,mode=max,scope=trivy-frontend
