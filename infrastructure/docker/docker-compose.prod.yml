# =============================================================================
# MikroServer - Production Docker Compose
#
# ARCHITECTURAL DECISIONS:
# 1. All services on isolated internal network — only Nginx exposed externally
# 2. Named volumes for data persistence — never bind-mount data dirs in prod
# 3. Resource limits prevent any single service from starving others
# 4. Health checks enable zero-downtime deploys with depends_on conditions
# 5. restart: unless-stopped for resilience without infinite crash loops
# 6. Secrets via environment file — no secrets in image layers
# =============================================================================

networks:
  mikroserver-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  app-logs:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mikroserver}
      POSTGRES_USER: ${POSTGRES_USER:-mikroserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - mikroserver-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikroserver} -d ${POSTGRES_DB:-mikroserver}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis (BullMQ + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - mikroserver-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      APP_NAME: MikroServer
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dashboard.mikroserver.ci,https://mikroserver.ci}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WAVE_API_KEY: ${WAVE_API_KEY}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET}
      WAVE_SUCCESS_URL: ${WAVE_SUCCESS_URL}
      WAVE_ERROR_URL: ${WAVE_ERROR_URL}
      WAVE_ALLOWED_IPS: ${WAVE_ALLOWED_IPS}
      # CinetPay Configuration
      CINETPAY_API_URL: ${CINETPAY_API_URL}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY}
      CINETPAY_WEBHOOK_SECRET: ${CINETPAY_WEBHOOK_SECRET}
      CINETPAY_CURRENCY: ${CINETPAY_CURRENCY}
      CINETPAY_DEFAULT_CHANNEL: ${CINETPAY_DEFAULT_CHANNEL}
      CINETPAY_NOTIFY_URL: ${CINETPAY_NOTIFY_URL}
      CINETPAY_RETURN_URL: ${CINETPAY_RETURN_URL}
      CINETPAY_ALLOWED_IPS: ${CINETPAY_ALLOWED_IPS}
      # SMTP Email notifications
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-MikroServer <noreply@mikroserver.app>}
      # Security hardening — explicit values prevent silent defaults
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      WEBHOOK_RATE_LIMIT_MAX: ${WEBHOOK_RATE_LIMIT_MAX:-200}
      LOG_LEVEL: info
      LOG_PRETTY: "false"
    # Port NOT exposed externally — Nginx on the host proxies to the internal network.
    # Exposing 3000 would bypass Nginx rate limiting and security headers.
    volumes:
      - app-logs:/app/logs
    networks:
      - mikroserver-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Next.js Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/proxy}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/proxy}
      API_INTERNAL_URL: http://api:3000
    ports:
      - "3001:3001"
    networks:
      - mikroserver-internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Nginx (Reverse proxy + TLS termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d/mikroserver.conf:/etc/nginx/conf.d/mikroserver.conf:ro
      - ../nginx/conf.d/mikroserver-http.conf:/etc/nginx/conf.d/mikroserver-http.conf:ro
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - mikroserver-internal
    depends_on:
      - api
      - dashboard
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Database migrations (runs once then exits)
  # ---------------------------------------------------------------------------
  db-migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: migrations
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - mikroserver-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["npx", "prisma", "migrate", "deploy"]
