# =============================================================================
# MikroServer — Déploiement simplifié (HTTP, sans SSL)
# Usage: docker compose -f docker-compose.simple.yml --env-file .env.prod up -d
# =============================================================================

networks:
  mikroserver-internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nginx-logs:
  app-logs:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mikroserver}
      POSTGRES_USER: ${POSTGRES_USER:-mikroserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - mikroserver-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikroserver} -d ${POSTGRES_DB:-mikroserver}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mikroserver-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db-migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: migrations
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - mikroserver-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["npx", "prisma", "migrate", "deploy"]

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 30d
      WAVE_API_KEY: ${WAVE_API_KEY:-placeholder}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET:-placeholder}
      WAVE_SUCCESS_URL: ${WAVE_SUCCESS_URL}
      WAVE_ERROR_URL: ${WAVE_ERROR_URL}
      WAVE_ALLOWED_IPS: ${WAVE_ALLOWED_IPS:-}
      WAVE_API_URL: https://api.wave.com/v1
      WAVE_CURRENCY: XOF
      WAVE_CHECKOUT_URL: https://pay.wave.com
      MIKROTIK_API_TIMEOUT_MS: 10000
      MIKROTIK_CONNECTION_POOL_SIZE: 3
      MIKROTIK_DEFAULT_PROFILE: default
      MIKROTIK_VOUCHER_PREFIX: MS
      QUEUE_VOUCHER_DELIVERY_ATTEMPTS: 5
      QUEUE_VOUCHER_DELIVERY_BACKOFF_MS: 5000
      QUEUE_CONCURRENCY: 5
      CIRCUIT_BREAKER_TIMEOUT_MS: 10000
      CIRCUIT_BREAKER_RESET_MS: 30000
      CIRCUIT_BREAKER_THRESHOLD: 50
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX: 100
      WEBHOOK_RATE_LIMIT_MAX: 200
      ARGON2_MEMORY: 65536
      ARGON2_ITERATIONS: 3
      ARGON2_PARALLELISM: 4
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      TRANSACTION_EXPIRY_MINUTES: 30
      METRICS_ENABLED: "true"
      SNAPSHOT_CRON: "0 0 * * *"
      CORS_ORIGINS: "http://${VPS_IP}"
      API_PREFIX: api/v1
      APP_NAME: MikroServer
    ports:
      - "3003:3003"
    volumes:
      - app-logs:/app/logs
    networks:
      - mikroserver-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/plans/public > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3000
    networks:
      - mikroserver-internal
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/conf.d/mikroserver-http.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/nginx-http.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - mikroserver-internal
    depends_on:
      - api
      - dashboard
