server {
    listen 80;
    server_name _;

    client_max_body_size 1m;
    limit_conn conn_limit 20;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Wave webhook — corps brut preserve pour verification HMAC
    location /proxy/api/v1/webhooks/ {
        limit_req zone=webhook burst=100 nodelay;
        proxy_pass          http://dashboard_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  15s;
        proxy_buffering     off;
    }

    # SSH WebSocket terminal (proxié vers api:3003)
    location /ws/ssh {
        proxy_pass          http://api_ssh_ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Tout le reste → Next.js (qui proxifie /proxy/* vers l'API en interne)
    location / {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass          http://dashboard_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_read_timeout  30s;
    }

    location ~ /\. { deny all; }
}
