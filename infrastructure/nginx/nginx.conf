# =============================================================================
# Nginx Production Configuration
# Security-hardened, performance-tuned
# =============================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 4096;
    server_tokens       off;   # Hide nginx version

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ---------------------------------------------------------------------------
    # Security Headers (global)
    # ---------------------------------------------------------------------------
    add_header X-Request-ID $request_id always;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---------------------------------------------------------------------------
    # Upstream pools
    # ---------------------------------------------------------------------------
    upstream api_backend {
        least_conn;
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream api_ssh_ws {
        server api:3003 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream dashboard_backend {
        server dashboard:3001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # HTTP → HTTPS redirect for known domains only
    # (Raw-IP access stays on HTTP via conf.d/mikroserver-http.conf)
    server {
        listen 80;
        server_name api.mikroserver.ci dashboard.mikroserver.ci;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    # Load virtual host configs
    include /etc/nginx/conf.d/*.conf;
}

# =============================================================================
# Stream (TCP proxy) — WebFig remote access
# Each router WireGuard IP 10.66.66.N is reachable at VPS port (9000+N).
# Port 9002 → 10.66.66.2:80, port 9003 → 10.66.66.3:80, etc.
# This proxies raw TCP so both HTTP and WebSocket work without modification.
# =============================================================================
stream {
    log_format stream_basic '$remote_addr [$time_local] '
                            '$protocol $status $bytes_sent $bytes_received '
                            '$session_time "$upstream_addr"';
    access_log /var/log/nginx/stream.log stream_basic;

    include /etc/nginx/stream.d/*.conf;
}
