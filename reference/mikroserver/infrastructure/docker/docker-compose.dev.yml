version: '3.9'

# Docker Compose pour développement local uniquement
# Lance PostgreSQL + Redis + interface visuelle BullMQ

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikroserver_dev
      POSTGRES_USER: mikroserver
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass devredis123
    ports:
      - "6379:6379"

  # Interface visuelle pour voir la base de données (optionnel mais pratique)
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mikroserver.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
