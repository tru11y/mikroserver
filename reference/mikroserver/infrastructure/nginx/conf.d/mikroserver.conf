# =============================================================================
# API Server
# =============================================================================
server {
    listen 443 ssl http2;
    server_name api.mikroserver.ci;

    # --- TLS ---
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; frame-ancestors 'none'" always;

    # --- Request limits ---
    client_max_body_size 1m;
    client_body_timeout  12s;
    client_header_timeout 12s;
    limit_conn conn_limit 20;

    # --- Webhook endpoint (higher rate limit, raw body preservation) ---
    location /api/v1/webhooks/ {
        limit_req zone=webhook burst=100 nodelay;

        # Pass raw body for HMAC verification
        proxy_pass         http://api_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 15s;
        proxy_buffering    off;  # Critical: no buffering for webhooks

        # Allow only Wave's known IP ranges (defense in depth)
        # Uncomment and configure for production:
        # allow 198.51.100.0/24;  # Wave webhook IPs
        # deny all;
    }

    # --- Auth endpoints (strict rate limit) ---
    location /api/v1/auth/login {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass        http://api_backend;
        proxy_set_header  Host             $host;
        proxy_set_header  X-Real-IP        $remote_addr;
        proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  X-Request-ID     $request_id;
    }

    # --- General API ---
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass          http://api_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Request-ID      $request_id;
        proxy_set_header    Connection        "";
        proxy_http_version  1.1;
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;

        # Buffer responses for performance
        proxy_buffering     on;
        proxy_buffer_size   4k;
        proxy_buffers       8 16k;
    }

    # --- Swagger docs (disable in true prod) ---
    location /docs {
        limit_req zone=api_general burst=10;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny hidden files
    location ~ /\. { deny all; }
}

# =============================================================================
# Dashboard Server
# =============================================================================
server {
    listen 443 ssl http2;
    server_name dashboard.mikroserver.ci;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.mikroserver.ci; frame-ancestors 'none'" always;

    limit_conn conn_limit 10;

    # Static assets with long cache
    location /_next/static/ {
        proxy_pass http://dashboard_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=api_general burst=20;
        proxy_pass          http://dashboard_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_read_timeout  30s;
    }

    location ~ /\. { deny all; }
}
