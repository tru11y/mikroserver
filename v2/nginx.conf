worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time cid=$http_x_correlation_id';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream api {
        server api:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS (replace with actual cert paths)
        ssl_certificate     /etc/letsencrypt/live/yourdomain/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # ── Proxy defaults ────────────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Generate correlation ID if not present
        map $http_x_correlation_id $cid {
            default $http_x_correlation_id;
            ""      $request_id;
        }
        proxy_set_header X-Correlation-Id $cid;

        # ── Auth endpoints (strict rate limit) ────────────────────────────────
        location /v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api;
        }

        # ── Webhook endpoints ─────────────────────────────────────────────────
        location /v1/webhooks/ {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://api;
            # Increase timeout for webhook processing
            proxy_read_timeout 10s;
        }

        # ── Health / Metrics (no rate limit) ──────────────────────────────────
        location = /health {
            proxy_pass http://api;
        }

        location = /metrics {
            # Restrict to internal monitoring
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://api;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api;
        }

        # ── Deny everything else ──────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
