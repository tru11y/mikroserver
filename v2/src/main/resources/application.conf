ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.mikroserver.api.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/mikroserver"
    url = ${?DATABASE_URL}
    user = "mikroserver"
    user = ${?DATABASE_USER}
    password = "change_me_in_production"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

jwt {
    privateKeyPem = ${JWT_PRIVATE_KEY_PEM}
    publicKeyPem = ${JWT_PUBLIC_KEY_PEM}
    issuer = "mikroserver"
    issuer = ${?JWT_ISSUER}
    audience = "mikroserver-api"
    audience = ${?JWT_AUDIENCE}
    accessTtlMinutes = 15
    accessTtlMinutes = ${?JWT_ACCESS_TTL_MINUTES}
    refreshTtlDays = 30
    refreshTtlDays = ${?JWT_REFRESH_TTL_DAYS}
}

wave {
    webhookSecret = ${WAVE_WEBHOOK_SECRET}
    apiBaseUrl = "https://api.wave.com/v1"
    apiBaseUrl = ${?WAVE_API_BASE_URL}
    apiKey = ${?WAVE_API_KEY}
}

wireguard {
    interface = "wg0"
    interface = ${?WG_INTERFACE}
    serverAddress = "10.66.66.1"
    serverAddress = ${?WG_SERVER_ADDRESS}
    subnet = "10.66.66.0/24"
    subnet = ${?WG_SUBNET}
    serverPort = 51820
    serverPort = ${?WG_SERVER_PORT}
    serverEndpoint = "127.0.0.1:51820"
    serverEndpoint = ${?WG_SERVER_ENDPOINT}
    serverPublicKey = ${?WG_SERVER_PUBLIC_KEY}
}

cors {
    allowedOrigins = "http://localhost:3000"
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
}

app {
    environment = "development"
    environment = ${?ENVIRONMENT}
}
